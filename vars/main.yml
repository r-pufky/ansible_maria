---
###############################################################################
# MariaDB Role Options
###############################################################################

# Updates:
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://mariadb.com/docs/release-notes/community-server

maria___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-30',
    _debian='trixie',
    _app='12.2',
  ) }}"


###############################################################################
# APT Packages
###############################################################################
# Reference:
# * https://mariadb.org/download
# * https://deb.mariadb.org/12.2/debian

maria___packages:
  - 'mariadb-server'
  - 'python3-mysqldb'  # community.mysql.
  - 'python3-pymysql'  # community.mysql.

  # Ansible
  - 'xz-utils'  # tar.xz backups.

maria___apt_sources:
  - name: 'mariadb'
    types:
      - 'deb'
    uris: '{{
        "https://deb.mariadb.org/" ~
        maria_srv_version | default(maria___release._app) ~
        "/debian"
      }}'
    suites:
      - 'trixie'
    components:
      - 'main'
    signed_by: 'https://mariadb.org/mariadb_release_signing_key.pgp'

###############################################################################
# Maria Options
###############################################################################

maria___app: "{{ {} | r_pufky.data.v3(

    _socket='/run/mysqld/mysqld.sock',
    _cfg='/etc/mysql/mariadb.cnf',
    _root_cnf='/root/.my.cnf',
    _stage='/tmp/maria_db_import.sql',
    _etc_d='/etc/mysql',
    _backup='/etc/mysql/maria_backup',
    _var_d='/var/lib/mysql',
    _usr_d='/usr',
    _conf_d='/etc/mysql/mariadb.conf.d',
    _secure_conf_d='/etc/mysql/secure.conf.d',
  ) }}"

###############################################################################
# Default MariaDB User/Group
###############################################################################

maria___group:
  name: 'mysql'
  gid: 301

maria___user:
  name: 'mysql'
  group: 'mysql'
  uid: 301
  shell: '/bin/false'
  home: '/nonexistent'
  comment: 'MariaDB Server,,,'
  create_home: false
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
